<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>The Family Kitchen</title>  
  <link rel="preconnect" href="https://fonts.googleapis.com" />  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />  
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />  
  <style>  
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }  
    :root {  
      --green: #2d7a47; --green-mid: #48a065; --green-light: #d4eddb; --green-dark: #1a4f2d;  
      --sky: #2f8abf;  
      --terra: #c96830;  
      --sage: #6b9e79;  
      --bg: #f5f9f6;  
      --text: #18301f; --text-mid: #3d6348; --text-light: #789983;  
      --border: #cce0d4; --border-light: #e5f0e8;  
      --white: #fff;  
    }  
    html { font-size: 16px; scroll-behavior: smooth; }  
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* ── HEADER ── */  
.header {  
  background: linear-gradient(145deg, #1e6e3a 0%, #2d8fb5 100%);  
  padding: 24px 20px 20px;  
  position: sticky; top: 0; z-index: 100;  
  box-shadow: 0 3px 20px rgba(29,110,58,0.3);  
}  
.header-inner { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 3px; }  
.site-title { font-size: clamp(20px, 5vw, 28px); font-weight: 700; color: #fff; letter-spacing: -0.02em; line-height: 1; }  
.site-sub { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.72); margin-top: 2px; }  
.search-wrap {  
  display: flex; align-items: center; background: #fff;  
  border-radius: 12px; padding: 0 14px; height: 46px;  
  max-width: 480px; margin: 14px auto 0;  
  box-shadow: 0 2px 12px rgba(0,0,0,0.14); gap: 10px;  
}  
.search-wrap svg { flex-shrink: 0; }  
#search-input {  
  flex: 1; border: none; outline: none;  
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;  
  color: var(--text); background: transparent;  
}  
#search-input::placeholder { color: var(--text-light); }  
#search-clear {  
  display: none; cursor: pointer; background: var(--bg);  
  border: none; border-radius: 50%; width: 22px; height: 22px;  
  font-size: 13px; font-weight: 700; color: var(--text-light);  
  align-items: center; justify-content: center; flex-shrink: 0;  
}  
#search-clear.visible { display: flex; }  
  
/* ── FILTERS ── */  
.filter-bar {  
  background: #fff; border-bottom: 1.5px solid var(--border);  
  padding: 10px 14px; overflow-x: auto; -webkit-overflow-scrolling: touch;  
  scrollbar-width: none;  
}  
.filter-bar::-webkit-scrollbar { display: none; }  
.filter-list { display: flex; gap: 6px; min-width: max-content; }  
.pill {  
  border-radius: 8px; padding: 6px 14px;  
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;  
  cursor: pointer; border: 1.5px solid var(--border); background: #fff;  
  color: var(--text-mid); transition: all 0.14s; white-space: nowrap;  
}  
.pill:hover { border-color: var(--green-mid); color: var(--green); background: var(--green-light); }  
.pill.active { background: var(--green); border-color: var(--green); color: #fff; }  
  
/* ── MAIN ── */  
.main { padding: 18px 14px 60px; max-width: 1100px; margin: 0 auto; }  
#results-count { font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }  
  
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }  
@media (min-width: 600px) { .grid { gap: 14px; } }  
@media (min-width: 760px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }  
@media (min-width: 1000px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 16px; } }  
  
/* ── CARD ── */  
.card {  
  background: #fff; border-radius: 14px; overflow: hidden;  
  border: 1.5px solid var(--border-light); cursor: pointer;  
  transition: transform 0.16s, box-shadow 0.16s, border-color 0.16s;  
  box-shadow: 0 1px 6px rgba(30,80,50,0.06);  
}  
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(30,80,50,0.13); border-color: var(--green-mid); }  
.card:active { transform: translateY(-1px); }  
.card-thumb { height: 110px; display: flex; align-items: center; justify-content: center; }  
.card-thumb svg { width: 80px; height: 60px; }  
.card-body { padding: 10px 12px 13px; }  
.card-cat { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); margin-bottom: 3px; }  
.card-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }  
.card-author { font-size: 12px; font-weight: 500; color: var(--terra); }  
  
/* ── EMPTY ── */  
.empty { display: none; text-align: center; padding: 60px 20px; }  
.empty.visible { display: block; }  
.empty-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; margin-top: 16px; }  
.empty-sub { font-size: 14px; color: var(--text-light); }  
  
/* ── MODAL ── */  
.overlay {  
  display: none; position: fixed; inset: 0;  
  background: rgba(18,42,24,0.6);  
  z-index: 200; align-items: flex-end; justify-content: center;  
  backdrop-filter: blur(6px);  
}  
.overlay.open { display: flex; animation: fadeIn 0.2s ease; }  
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }  
@media (min-width: 620px) { .overlay { align-items: center; } }  
  
.modal {  
  background: var(--bg); width: 100%; max-width: 660px; max-height: 93vh;  
  border-radius: 22px 22px 0 0; overflow-y: auto;  
  animation: slideUp 0.26s cubic-bezier(0.34,1.4,0.64,1);  
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;  
}  
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }  
@media (min-width: 620px) { .modal { border-radius: 22px; } }  
  
.modal-hero {  
  height: 170px; display: flex; align-items: center; justify-content: center;  
  position: relative; border-bottom: 1.5px solid var(--border);  
}  
.modal-hero svg { width: 140px; height: 110px; }  
.modal-drag {  
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);  
  width: 36px; height: 4px; background: rgba(60,100,70,0.2); border-radius: 4px;  
}  
.modal-close {  
  position: absolute; top: 12px; right: 12px; width: 34px; height: 34px;  
  background: rgba(255,255,255,0.9); border: none; border-radius: 50%;  
  font-size: 15px; font-weight: 700; cursor: pointer; color: var(--text);  
  display: flex; align-items: center; justify-content: center;  
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); line-height: 1;  
}  
.modal-body { padding: 20px 20px 44px; }  
.modal-cat { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); margin-bottom: 4px; }  
.modal-title { font-size: clamp(20px, 5vw, 26px); font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 4px; letter-spacing: -0.01em; }  
.modal-by { font-size: 14px; font-weight: 600; color: var(--terra); margin-bottom: 20px; }  
  
.section-head { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }  
.ingredients-list { margin-bottom: 22px; }  
.ing-row { display: flex; align-items: baseline; gap: 12px; padding: 9px 0; border-bottom: 1px dashed var(--border); font-size: 14px; }  
.ing-row:last-child { border-bottom: none; }  
.ing-amt { font-weight: 700; color: var(--terra); min-width: 60px; font-size: 13px; flex-shrink: 0; }  
.ing-name { font-weight: 500; color: var(--text); }  
  
.steps-list { margin-bottom: 22px; }  
.step-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }  
.step-num {  
  background: var(--sky); color: #fff; min-width: 26px; height: 26px;  
  border-radius: 50%; display: flex; align-items: center; justify-content: center;  
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;  
}  
.step-text { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.65; }  
.notes-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green); margin-bottom: 6px; }  
.notes-box { background: var(--green-light); border-left: 3px solid var(--green); border-radius: 0 10px 10px 0; padding: 13px 15px; font-size: 13px; font-weight: 500; color: var(--text-mid); line-height: 1.65; white-space: pre-wrap; }

function getIllustration(category, scale=1) {  
  const p = CAT_PALETTES[category] || {bg:'#eef4ee', stroke:'#508060'};  
  const fn = DRAWINGS[category] || defaultDrawing;  
  return { bg: p.bg, svg: fn(p.stroke) };  
}  
  
// ── STATE ───────────────────────────────────────────────────────  
let currentFilter = 'All';  
let currentSearch = '';  
let selectedRecipe = null;  
  
const CATEGORIES = ['All', ...Array.from(new Set(RECIPES.map(r => r.category))).sort()];  
  
// ── INIT ────────────────────────────────────────────────────────  
document.getElementById('recipe-count-sub').textContent = `${RECIPES.length} recipes passed down with love`;  
  
// Build filters  
const filterList = document.getElementById('filter-list');  
CATEGORIES.forEach(cat => {  
  const btn = document.createElement('button');  
  btn.className = 'pill' + (cat === 'All' ? ' active' : '');  
  btn.textContent = cat;  
  btn.addEventListener('click', () => {  
    currentFilter = cat;  
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));  
    btn.classList.add('active');  
    renderGrid();  
  });  
  filterList.appendChild(btn);  
});  
  
// Search  
const searchInput = document.getElementById('search-input');  
const searchClear = document.getElementById('search-clear');  
searchInput.addEventListener('input', () => {  
  currentSearch = searchInput.value;  
  searchClear.classList.toggle('visible', !!currentSearch);  
  renderGrid();  
});  
searchClear.addEventListener('click', () => {  
  searchInput.value = '';  
  currentSearch = '';  
  searchClear.classList.remove('visible');  
  renderGrid();  
});  
  
// Modal  
const overlay = document.getElementById('overlay');  
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });  
document.getElementById('modal-close').addEventListener('click', closeModal);  
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });  
  
function closeModal() {  
  overlay.classList.remove('open');  
  document.body.style.overflow = '';  
}  
  
function openModal(recipe) {  
  const {bg, svg} = getIllustration(recipe.category);  
  document.getElementById('modal-hero').style.background = bg;  
  document.getElementById('modal-illustration').innerHTML = svg;  
  document.getElementById('modal-cat').textContent = recipe.category;  
  document.getElementById('modal-title').textContent = recipe.title;  
  const byEl = document.getElementById('modal-by');  
  byEl.textContent = recipe.author ? `By ${recipe.author}` : '';  
  byEl.style.display = recipe.author ? 'block' : 'none';  
  
  // Ingredients  
  const ingEl = document.getElementById('modal-ingredients');  
  if (recipe.ingredients && recipe.ingredients.length) {  
    let html = '<h3 class="section-head">Ingredients</h3><div class="ingredients-list">';  
    recipe.ingredients.forEach(ing => {  
      html += `<div class="ing-row"><span class="ing-amt">${ing.amount||''}</span><span class="ing-name">${ing.name||''}</span></div>`;  
    });  
    html += '</div>';  
    ingEl.innerHTML = html;  
  } else { ingEl.innerHTML = ''; }  
  
  // Steps  
  const stepsEl = document.getElementById('modal-steps');  
  if (recipe.steps && recipe.steps.length) {  
    let html = '<h3 class="section-head">Instructions</h3><div class="steps-list">';  
    recipe.steps.forEach((step, i) => {  
      html += `<div class="step-row"><span class="step-num">${i+1}</span><p class="step-text">${step}</p></div>`;  
    });  
    html += '</div>';  
    stepsEl.innerHTML = html;  
  } else { stepsEl.innerHTML = ''; }  
  
  document.getElementById('modal-notes').innerHTML = '';  
  document.getElementById('modal').scrollTop = 0;  
  overlay.classList.add('open');  
  document.body.style.overflow = 'hidden';  
}  
  
// ── RENDER ──────────────────────────────────────────────────────  
function renderGrid() {  
  const q = currentSearch.toLowerCase();  
  const filtered = RECIPES.filter(r => {  
    const matchCat = currentFilter === 'All' || r.category === currentFilter;  
    const matchSearch = !q ||  
      r.title.toLowerCase().includes(q) ||  
      r.category.toLowerCase().includes(q) ||  
      (r.author||'').toLowerCase().includes(q);  
    return matchCat && matchSearch;  
  });  
  
  const count = filtered.length;  
  let countText = `${count} ${count === 1 ? 'recipe' : 'recipes'}`;  
  if (currentFilter !== 'All') countText += ` · ${currentFilter}`;  
  if (currentSearch) countText += ` matching "${currentSearch}"`;  
  document.getElementById('results-count').textContent = countText;  
  
  const grid = document.getElementById('grid');  
  const empty = document.getElementById('empty');  
  
  if (count === 0) {  
    grid.innerHTML = '';  
    empty.classList.add('visible');  
    return;  
  }  
  empty.classList.remove('visible');  
  
  grid.innerHTML = filtered.map(r => {  
    const {bg, svg} = getIllustration(r.category);  
    return `  
      <div class="card" data-id="${r.id}">  
        <div class="card-thumb" style="background:${bg}">${svg}</div>  
        <div class="card-body">  
          <p class="card-cat">${r.category}</p>  
          <h2 class="card-title">${r.title}</h2>  
          ${r.author ? `<p class="card-author">${r.author}</p>` : ''}  
        </div>  
      </div>`;  
  }).join('');  
  
  grid.querySelectorAll('.card').forEach(card => {  
    card.addEventListener('click', () => {  
      const id = parseInt(card.dataset.id);  
      const recipe = RECIPES.find(r => r.id === id);  
      if (recipe) openModal(recipe);  
    });  
  });  
}  
  
renderGrid();  
</script>  
  
</body>  
</html>
